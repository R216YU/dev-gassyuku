Parameters:
  LambdaFunctionName:
    Type: String
    Default: "nfsTest"
    Description: "Lambda function name."
  LambdaRoleName:
    Type: String
    Default: "nfsTest-role"
    Description: "IAM role name for the Lambda function."
  S3BucketName:
    Type: String
    Default: "dev-gassyuku-tokyo"
    Description: "S3 bucket name that the Lambda function accesses via S3 Files."
  VpcLambdaSGExport:
    Type: String
    Description: "CloudFormation export name for the Lambda security group ID."
  VpcPrivateSubnetExport:
    Type: String
    Description: "CloudFormation export name for the private subnet ID."
  LambdaCodeS3Bucket:
    Type: String
    Description: "S3 bucket name where the Lambda ZIP file is stored."
  LambdaCodeS3Key:
    Type: String
    Description: "S3 object key of the Lambda ZIP file (e.g. lambda/nfsTest.zip)."
Resources:
  IAMRoleNfsTestrolennxwpvmw:
    UpdateReplacePolicy: "Delete"
    Type: "AWS::IAM::Role"
    DeletionPolicy: "Delete"
    Properties:
      Path: "/service-role/"
      ManagedPolicyArns:
      - "arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole"
      - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      MaxSessionDuration: 3600
      RoleName: !Ref LambdaRoleName
      Policies:
      - PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Resource:
            - !Sub "arn:aws:s3:::${S3BucketName}"
            - !Sub "arn:aws:s3:::${S3BucketName}/*"
            Action:
            - "s3:GetObject"
            - "s3:PutObject"
            - "s3:DeleteObject"
            - "s3:ListBucket"
            Effect: "Allow"
          - Resource:
            - !ImportValue "s3files-AccessPointArn"
            Action:
            - "elasticfilesystem:ClientMount"
            - "elasticfilesystem:ClientWrite"
            - "elasticfilesystem:ClientRootAccess"
            Effect: "Allow"
        PolicyName: "Lambda-S3-NFS-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
        - Action: "sts:AssumeRole"
          Effect: "Allow"
          Principal:
            Service: "lambda.amazonaws.com"
  LambdaFunctionNfsTest:
    UpdateReplacePolicy: "Delete"
    Type: "AWS::Lambda::Function"
    DeletionPolicy: "Delete"
    Properties:
      MemorySize: 128
      Description: ""
      TracingConfig:
        Mode: "PassThrough"
      VpcConfig:
        SecurityGroupIds:
        - Fn::ImportValue: !Ref VpcLambdaSGExport
        SubnetIds:
        - Fn::ImportValue: !Ref VpcPrivateSubnetExport
        Ipv6AllowedForDualStack: false
      Timeout: 3
      RuntimeManagementConfig:
        UpdateRuntimeOn: "Auto"
      Handler: "lambda_function.lambda_handler"
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Role: !GetAtt IAMRoleNfsTestrolennxwpvmw.Arn
      FileSystemConfigs:
      - Arn: !ImportValue "s3files-AccessPointArn"
        LocalMountPath: "/mnt/s3"
      FunctionName: !Ref LambdaFunctionName
      Runtime: "python3.14"
      PackageType: "Zip"
      LoggingConfig:
        LogFormat: "Text"
        LogGroup: "/aws/lambda/nfsTest"
      RecursiveLoop: "Terminate"
      EphemeralStorage:
        Size: 512
      Architectures:
      - "x86_64"
