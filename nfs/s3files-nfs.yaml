Parameters:
  S3BucketName:
    Type: String
    Default: "dev-gassyuku-tokyo"
    Description: "Name of the S3 bucket to create."
  MountTargetSubnetId:
    Type: String
    Description: "Subnet ID for the mount target."
  MountTargetSecurityGroupId:
    Type: String
    Description: "Security group ID for the mount target."

Resources:
  S3FilesPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    DeletionPolicy: "Delete"
    UpdateReplacePolicy: "Delete"
    Properties:
      ManagedPolicyName: "S3FilesPolicy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "S3BucketPermissions"
            Effect: "Allow"
            Action:
              - "s3:ListBucket*"
            Resource: !GetAtt S3BucketDevgassyukutokyo.Arn
            Condition:
              StringEquals:
                aws:ResourceAccount: !Sub "${AWS::AccountId}"
          - Sid: "S3ObjectPermissions"
            Effect: "Allow"
            Action:
              - "s3:AbortMultipartUpload"
              - "s3:DeleteObject*"
              - "s3:GetObject*"
              - "s3:List*"
              - "s3:PutObject*"
            Resource: !Sub "arn:aws:s3:::${S3BucketDevgassyukutokyo}/*"
            Condition:
              StringEquals:
                aws:ResourceAccount: !Sub "${AWS::AccountId}"
          - Sid: "UseKmsKeyWithS3Files"
            Effect: "Allow"
            Action:
              - "kms:GenerateDataKey"
              - "kms:Encrypt"
              - "kms:Decrypt"
              - "kms:ReEncryptFrom"
              - "kms:ReEncryptTo"
            Condition:
              StringLike:
                "kms:ViaService": !Sub "s3.${AWS::Region}.amazonaws.com"
                "kms:EncryptionContext:aws:s3:arn":
                  - !Sub "arn:aws:s3:::${S3BucketDevgassyukutokyo}"
                  - !Sub "arn:aws:s3:::${S3BucketDevgassyukutokyo}/*"
            Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:*"
          - Sid: "EventBridgeManage"
            Effect: "Allow"
            Action:
              - "events:DeleteRule"
              - "events:DisableRule"
              - "events:EnableRule"
              - "events:PutRule"
              - "events:PutTargets"
              - "events:RemoveTargets"
            Condition:
              StringEquals:
                events:ManagedBy: "elasticfilesystem.amazonaws.com"
            Resource:
              - "arn:aws:events:*:*:rule/DO-NOT-DELETE-S3-Files*"
          - Sid: "EventBridgeRead"
            Effect: "Allow"
            Action:
              - "events:DescribeRule"
              - "events:ListRuleNamesByTarget"
              - "events:ListRules"
              - "events:ListTargetsByRule"
            Resource:
              - "arn:aws:events:*:*:rule/*"

  S3FilesRole:
    Type: "AWS::IAM::Role"
    DeletionPolicy: "Delete"
    UpdateReplacePolicy: "Delete"
    Properties:
      RoleName: "S3FilesRole"
      ManagedPolicyArns:
        - !Ref S3FilesPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "elasticfilesystem.amazonaws.com"
            Action: "sts:AssumeRole"

  S3BucketDevgassyukutokyo:
    UpdateReplacePolicy: "Delete"
    Type: "AWS::S3::Bucket"
    DeletionPolicy: "Delete"
    Properties:
      PublicAccessBlockConfiguration:
        RestrictPublicBuckets: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        BlockPublicAcls: true
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: "Enabled"
      OwnershipControls:
        Rules:
        - ObjectOwnership: "BucketOwnerEnforced"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - BucketKeyEnabled: true
          BlockedEncryptionTypes:
            EncryptionType:
            - "SSE-C"
          ServerSideEncryptionByDefault:
            SSEAlgorithm: "AES256"

  S3FilesFileSystem:
    Type: "AWS::S3Files::FileSystem"
    DeletionPolicy: "Delete"
    UpdateReplacePolicy: "Delete"
    Properties:
      Bucket: !GetAtt S3BucketDevgassyukutokyo.Arn
      RoleArn: !GetAtt S3FilesRole.Arn
      AcceptBucketWarning: true

  S3FilesMountTarget:
    Type: "AWS::S3Files::MountTarget"
    DeletionPolicy: "Delete"
    UpdateReplacePolicy: "Delete"
    Properties:
      FileSystemId: !GetAtt S3FilesFileSystem.FileSystemId
      SubnetId: !Ref MountTargetSubnetId
      SecurityGroups:
        - !Ref MountTargetSecurityGroupId

  S3FilesAccessPoint:
    Type: "AWS::S3Files::AccessPoint"
    DeletionPolicy: "Delete"
    UpdateReplacePolicy: "Delete"
    Properties:
      FileSystemId: !GetAtt S3FilesFileSystem.FileSystemId
      PosixUser:
        Uid: "1000"
        Gid: "1000"
      RootDirectory:
        Path: "/lambda"
        CreationPermissions:
          OwnerUid: "1000"
          OwnerGid: "1000"
          Permissions: "755"

Outputs:
  S3FilesAccessPointArn:
    Value: !Sub
      - "arn:aws:s3files:${AWS::Region}:${AWS::AccountId}:file-system/${FileSystemId}/access-point/${AccessPointId}"
      - FileSystemId: !GetAtt S3FilesFileSystem.FileSystemId
        AccessPointId: !GetAtt S3FilesAccessPoint.AccessPointId
    Description: "ARN of the S3 Files access point."
    Export:
      Name: "s3files-AccessPointArn"
